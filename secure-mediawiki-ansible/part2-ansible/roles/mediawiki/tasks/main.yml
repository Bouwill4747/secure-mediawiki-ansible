---
- name: Download MediaWiki tarball
  get_url:
    url: "{{ mw_url }}"
    dest: "/tmp/{{ mw_archive }}"

- name: Create the install directory
  file:
    path: "{{ mw_install_dir }}"
    state: directory
    owner: www-data
    group: www-data

- name: Extract MediaWiki
  unarchive:
    src: "/tmp/{{ mw_archive }}"
    dest: "{{ mw_install_dir }}"
    remote_src: yes
    extra_opts: [--strip-components=1]
    creates: "{{ mw_install_dir }}/index.php"

- name: Install Composer
  apt:
    name: composer
    state: present

- name: Install PHP dependencies via Composer
  command: composer install --no-dev
  args:
    chdir: "{{ mw_install_dir }}"
    creates: "{{ mw_install_dir }}/vendor/autoload.php"
  become_user: www-data

- name: Run MediaWiki install.php
  command: >
    php {{ mw_install_dir }}/maintenance/install.php
    --dbtype=mysql
    --dbserver={{ hostvars['srv-db'].ansible_host }}
    --dbname={{ db_name }}
    --dbuser={{ db_user }}
    --dbpass={{ db_password }}
    --server={{ mw_server }}
    --scriptpath=/mediawiki
    --pass={{ mw_admin_password }}
    --lang=fr
    "{{ mw_site_name }}"
    {{ mw_admin_user }}
  args:
    creates: "{{ mw_install_dir }}/LocalSettings.php"
  become_user: www-data
