# Ansible inventory — example
#
# Copy this file to `inventory.ini` and fill in real values.
# `inventory.ini` is gitignored and should never be committed.

[web]
srv-web ansible_host=10.0.0.10

[db]
srv-db ansible_host=10.0.0.20

[mediawiki:children]
web
db

[all:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_become=yes
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
