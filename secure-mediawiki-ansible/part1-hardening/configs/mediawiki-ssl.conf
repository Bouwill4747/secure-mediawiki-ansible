# /etc/apache2/sites-available/mediawiki-ssl.conf
#
# Hardened Apache HTTPS VirtualHost with security headers.
# Enable with: sudo a2ensite mediawiki-ssl.conf

<VirtualHost *:443>
    ServerAdmin admin@example.local
    ServerName  srv-web.example.local
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/server.crt
    SSLCertificateKeyFile   /etc/ssl/private/server.key

    # Modern TLS only
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder     on

    # --- Security headers ------------------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/ssl_access.log combined
</VirtualHost>

# Also set globally in /etc/apache2/conf-available/security.conf:
# ServerTokens ProductOnly
# ServerSignature Off
