---
- name: Update APT cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pymysql
      - acl  # required for Ansible's become_user on a non-root unprivileged user
    state: present
