#!/usr/sbin/nft -f
#
# Hardened nftables ruleset — Debian 12
#
# Posture: default drop on input and forward. Only explicit services
# (SSH, HTTP, HTTPS) are accepted. Loopback is trusted. Established
# and related connections return without an explicit rule for each
# source port.

flush ruleset

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        # Trust the loopback interface (local services, DB sockets, etc.)
        iif "lo" accept

        # Allow return traffic for connections initiated by this host
        ct state established,related accept

        # Drop invalid packets without even logging them
        ct state invalid drop

        # Allow ICMP echo (ping) — useful for diagnostics, low risk
        ip  protocol icmp   icmp   type echo-request limit rate 5/second accept
        ip6 nexthdr   icmpv6 icmpv6 type echo-request limit rate 5/second accept

        # SSH with rate limiting (brute-force mitigation layer 1)
        tcp dport 22 ct state new limit rate 5/minute accept

        # HTTP / HTTPS
        tcp dport { 80, 443 } ct state new accept

        # Log-and-drop everything else (rate-limited to avoid log flooding)
        limit rate 1/second log prefix "nft drop: " flags all
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
